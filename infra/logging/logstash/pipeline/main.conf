input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }

  udp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON logs from NestJS / application containers
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      remove_field => ["message"]
    }
    mutate {
      rename => {
        "[parsed][level]"     => "log_level"
        "[parsed][msg]"       => "message"
        "[parsed][timestamp]" => "app_timestamp"
        "[parsed][context]"   => "context"
        "[parsed][traceId]"   => "trace_id"
        "[parsed][pid]"       => "pid"
      }
    }
  }

  # Normalise log levels
  mutate {
    uppercase => ["log_level"]
  }

  # Parse HTTP access-log lines
  if [message] =~ /^(\S+) - - \[/ {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - - \[%{HTTPDATE:request_time}\] "%{WORD:method} %{URIPATHPARAM:request_path} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:response_bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}" %{NUMBER:response_time_ms:float}'
      }
      tag_on_failure => ["_grok_http_parse_failure"]
    }
    date {
      match => ["request_time", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }
  }

  # Tag slow requests (> 1000ms)
  if [response_time_ms] and [response_time_ms] > 1000 {
    mutate { add_tag => ["slow_request"] }
  }

  # Tag error responses
  if [status_code] and [status_code] >= 500 {
    mutate { add_tag => ["server_error"] }
  }

  # Parse Docker container metadata
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # Drop health-check noise
  if [request_path] == "/health" or [request_path] == "/metrics" {
    drop {}
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:production}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "brain-storm-logs-%{+YYYY.MM.dd}"
    template_name => "brain-storm-logs"
    template_overwrite => false
  }

  # Mirror errors to a dedicated index for alerting
  if "server_error" in [tags] or [log_level] == "ERROR" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "brain-storm-errors-%{+YYYY.MM.dd}"
    }
  }
}
