filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          process_array: false
          max_depth: 2
          target: ""
          overwrite_keys: true
          add_error_key: true

  - type: log
    enabled: true
    paths:
      - /var/log/brain-storm/*.log
    fields:
      source: app-logs
    multiline:
      pattern: '^\d{4}-\d{2}-\d{2}'
      negate: true
      match: after

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_fields:
      target: ''
      fields:
        project: brain-storm

output.logstash:
  hosts: ["logstash:5044"]
  loadbalance: true
  ssl.enabled: false

setup.kibana:
  host: "${KIBANA_HOST:http://kibana:5601}"

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0640
