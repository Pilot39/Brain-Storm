apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "brain-storm.fullname" . }}-config
  labels:
    {{- include "brain-storm.labels" . | nindent 4 }}
data:
  DATABASE_HOST: {{ include "brain-storm.postgresHost" . | quote }}
  DATABASE_PORT: "5432"
  DATABASE_NAME: {{ .Values.postgresql.auth.database | default "brain-storm" | quote }}
  REDIS_HOST: {{ include "brain-storm.redisHost" . | quote }}
  REDIS_PORT: "6379"
  STELLAR_NETWORK: {{ .Values.backend.env.STELLAR_NETWORK | default "testnet" | quote }}
  NODE_ENV: {{ .Values.backend.env.NODE_ENV | default "production" | quote }}
