# Default values for brain-storm Helm chart.
# Override per environment with -f values-staging.yaml or -f values-prod.yaml

global:
  imageRegistry: ""          # Optional prefix, e.g. ghcr.io/braintease
  imagePullSecrets: []
  storageClass: ""

# ─── Backend (NestJS API) ─────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/braintease/brain-storm/backend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Liveness probe — restarts the container if the app hangs
  livenessProbe:
    httpGet:
      path: /v1/health/liveness
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  # Readiness probe — gates traffic until the app is ready
  readinessProbe:
    httpGet:
      path: /v1/health/readiness
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  env:
    NODE_ENV: production
    PORT: "3000"
    STELLAR_NETWORK: testnet

  # Secrets must be pre-created as Kubernetes Secrets
  existingSecret: brain-storm-backend-secret
  # Keys expected in the secret:
  #   DATABASE_PASSWORD, JWT_SECRET, STELLAR_SECRET_KEY

# ─── Frontend (Next.js) ───────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/braintease/brain-storm/frontend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 3001

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3001
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  env:
    NODE_ENV: production
    PORT: "3001"
    NEXT_PUBLIC_STELLAR_NETWORK: testnet
    # NEXT_PUBLIC_API_URL is rendered from ingress host at deploy time

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: brain-storm.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.brain-storm.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: brain-storm-tls
      hosts:
        - brain-storm.example.com
        - api.brain-storm.example.com

# ─── PostgreSQL (bitnami subchart — disable for external managed DB) ──────────
postgresql:
  enabled: true
  auth:
    database: brain-storm
    existingSecret: brain-storm-postgres-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

# External DB settings (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  database: brain-storm
  username: brain-storm
  existingSecret: brain-storm-backend-secret
  existingSecretPasswordKey: DATABASE_PASSWORD

# ─── Redis (bitnami subchart — disable for external managed Redis) ────────────
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

externalRedis:
  host: ""
  port: 6379

# ─── Service Account ──────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ─── Pod settings ─────────────────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
