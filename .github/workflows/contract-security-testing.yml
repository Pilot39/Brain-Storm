name: Contract Security Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - '.github/workflows/contract-security-testing.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/**'

jobs:
  security-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run security tests
        run: |
          cd contracts/token
          cargo test --lib security_tests -- --nocapture
      
      - name: Run reentrancy tests
        run: |
          cd contracts/token
          cargo test --lib reentrancy_tests -- --nocapture
      
      - name: Run overflow/underflow tests
        run: |
          cd contracts/token
          cargo test --lib overflow_underflow_tests -- --nocapture
      
      - name: Run access control tests
        run: |
          cd contracts/token
          cargo test --lib access_control_tests -- --nocapture
      
      - name: Run state management tests
        run: |
          cd contracts/token
          cargo test --lib state_management_tests -- --nocapture
      
      - name: Generate test report
        if: always()
        run: |
          mkdir -p coverage/security
          echo "Security tests completed" > coverage/security/report.txt
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: coverage/security/
