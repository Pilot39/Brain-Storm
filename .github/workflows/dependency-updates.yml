name: Dependency Updates Testing & Notifications

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'apps/*/package.json'
      - 'apps/*/package-lock.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'contracts/*/Cargo.toml'

permissions:
  contents: read
  pull-requests: write

jobs:
  test-dependency-updates:
    name: Test Dependency Updates
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'dependabot/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace=apps/backend
        continue-on-error: true

      - name: Run frontend tests
        run: npm run test --workspace=apps/frontend
        continue-on-error: true

      - name: Run contract tests
        run: cargo test --all
        working-directory: contracts
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit Rust dependencies
        run: cargo audit
        continue-on-error: true

      - name: Comment on PR with test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = {
              backend: ${{ job.status == 'success' }},
              frontend: ${{ job.status == 'success' }},
              contracts: ${{ job.status == 'success' }}
            };
            
            const comment = `## 🔄 Dependency Update Test Results
            
            - Backend Tests: ${testResults.backend ? '✅ Passed' : '⚠️ Check logs'}
            - Frontend Tests: ${testResults.frontend ? '✅ Passed' : '⚠️ Check logs'}
            - Contract Tests: ${testResults.contracts ? '✅ Passed' : '⚠️ Check logs'}
            
            Security checks have been run. Please review the logs for any vulnerabilities.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  notify-security-updates:
    name: Notify Security Updates
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'dependabot/') && contains(github.head_ref, 'security')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add security label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'dependencies']
            });

      - name: Comment on security PR
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `🔒 **Security Update Detected**
            
            This PR contains security patches. Please prioritize review and merge.
            
            - Review the changelog for breaking changes
            - Run the full test suite
            - Verify compatibility with existing code`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
