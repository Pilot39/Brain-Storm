name: Deploy to Staging

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      seed_data:
        description: 'Seed staging with data after deploy'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  build-and-push:
    name: Build and Push Staging Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=staging

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-and-push

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/brain-storm
            export STAGING_BACKEND_IMAGE=${{ needs.build-and-push.outputs.backend-tag }}
            export STAGING_FRONTEND_IMAGE=${{ needs.build-and-push.outputs.frontend-tag }}
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
        continue-on-error: true

  run-migrations:
    name: Run Staging Migrations
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Run migrations on staging
        run: npm run migration:run --workspace=apps/backend
        env:
          DATABASE_HOST: ${{ secrets.STAGING_DB_HOST }}
          DATABASE_PORT: ${{ secrets.STAGING_DB_PORT }}
          DATABASE_USER: ${{ secrets.STAGING_DB_USER }}
          DATABASE_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          DATABASE_NAME: brain-storm-staging

  seed-staging:
    name: Seed Staging Data
    runs-on: ubuntu-latest
    needs: run-migrations
    if: ${{ github.event.inputs.seed_data == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Seed staging data
        run: ./scripts/seed-staging-data.sh basic
        env:
          DATABASE_HOST: ${{ secrets.STAGING_DB_HOST }}
          DATABASE_PORT: ${{ secrets.STAGING_DB_PORT }}
          DATABASE_USER: ${{ secrets.STAGING_DB_USER }}
          DATABASE_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          DATABASE_NAME: brain-storm-staging

  staging-health-check:
    name: Staging Health Check
    runs-on: ubuntu-latest
    needs: run-migrations

    steps:
      - name: Health check
        run: |
          until curl -sf "${{ vars.STAGING_URL }}/health"; do
            echo "Waiting for staging backend..."
            sleep 10
          done
          echo "Staging is healthy"
        timeout-minutes: 5
        continue-on-error: true
