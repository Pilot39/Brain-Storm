name: Mutation Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - '.github/workflows/mutation-testing.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'

jobs:
  mutation-testing:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run mutation tests
        run: npm run test:mutation
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
      
      - name: Generate mutation report
        run: npm run test:mutation:report
      
      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-results
          path: coverage/mutation/
      
      - name: Comment on PR with mutation score
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'coverage/mutation/mutation.json';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const score = report.mutationScore || 'N/A';
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `📊 Mutation Score: ${score}%`
              });
            }
