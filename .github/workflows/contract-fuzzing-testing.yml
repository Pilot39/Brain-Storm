name: Contract Fuzzing Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - '.github/workflows/contract-fuzzing-testing.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/**'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  fuzzing:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run fuzzing tests
        run: |
          cd contracts/token
          cargo test --lib fuzzing -- --nocapture
        env:
          PROPTEST_CASES: 10000
      
      - name: Generate fuzzing report
        if: always()
        run: |
          mkdir -p coverage/fuzzing
          echo "Fuzzing tests completed with 10000 cases" > coverage/fuzzing/report.txt
      
      - name: Upload fuzzing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-test-results
          path: coverage/fuzzing/
      
      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Fuzzing tests completed with 10000 test cases'
            })
