name: Visual Regression Testing

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/visual-regression-testing.yml'

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: apps/frontend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend

      - name: Run visual regression tests
        run: npx playwright test --config=playwright-visual.config.ts
        working-directory: apps/frontend

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-results
          path: |
            apps/frontend/test-results-visual/
            apps/frontend/playwright-report-visual/
          retention-days: 30

      - name: Upload visual diff artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-artifacts
          path: |
            apps/frontend/test-results-visual/
            apps/frontend/playwright-report-visual/
          retention-days: 7

      - name: Comment PR with visual diff results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const reportPath = 'apps/frontend/playwright-report-visual/index.html';
            if (fs.existsSync(reportPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📸 Visual Regression Test Results
                
                Visual regression tests have detected changes. Please review the differences:
                
                - Download the \`visual-diff-artifacts\` from the workflow run
                - Review the visual differences in the Playwright report
                - Update baselines if changes are intentional
                
                [View detailed report in workflow artifacts](${context.payload.pull_request.html_url}/checks)`
              });
            }
